  tags: ['Alam','Sukabumi'], desc: 'Destinasi indah di Sukabumi yang menakjubkan.',
  tips: ['Bawa kamera', 'Datang pagi hari'], info: { jam: 'Sesuai jadwal', tiket: 'Hubungi pengelola', jarak: '-', waktu: '-', parkir: 'Tersedia', guide: 'Tersedia' },
  gallery: [], nearby: [], reviews: []
};

function renderDest() {

    <div class="gallery-item"><div class="gi ${g.bg}">${g.emoji}</div></div>

    <a href="/SukabumiDiscovery/destination?id=${n.id}" class="nearby-item">

    '📍': ['Jarak', d.info.jarak],
    '🚗': ['Waktu Tempuh', d.info.waktu],
    '🅿️': ['Parkir', d.info.parkir],
    '👤': ['Guide', d.info.guide],
  }).map(([icon, [label, val]]) => `
    <div class="info-row">
      <div class="ir-icon">${icon}</div>
      <div><div class="ir-label">${label}</div><div class="ir-val">${val}</div></div>
    </div>

  const tipsHtml = (d.tips||[]).map(t => `<li>${t}</li>`).join('');

  document.getElementById('destContent').innerHTML = `
    <div class="dest-hero ${d.bgColor}" style="color:${d.bgColor==='bg-yellow'||d.bgColor==='bg-teal'?'var(--dark)':'var(--white)'}">
      <div class="dest-hero-bg">${d.emoji}</div>
      <div class="dest-hero-inner">
        <div class="breadcrumb">
          <a href="/SukabumiDiscovery" style="color:inherit">Home</a>
          <span>›</span>
          <a href="/SukabumiDiscovery/things-to-do" style="color:inherit">Things To Do</a>
          <span>›</span>
          <span>${d.name}</span>
        </div>
        <div class="dest-hero-meta">
          ${tagsHtml}
        </div>
        <h1>${d.name}</h1>
        <div class="dest-hero-meta" style="margin-top:12px">
          <span>📍 ${d.loc}</span>
          <span>${starsHtml} ${d.rating} (${typeof d.reviews === 'number' ? d.reviews : (d.reviews||[]).length}+ ulasan)</span>
          <span>${d.category}</span>
        </div>
        <div class="dest-hero-actions">
          <a href="/SukabumiDiscovery/map" class="btn btn-white">🗺 Lihat di Peta</a>

        ${nearbyHtml ? `<div class="info-box"><h4>📍 Destinasi Terdekat</h4><div class="nearby-list">${nearbyHtml}</div></div>` : ''}

        <a href="/SukabumiDiscovery/things-to-do" class="btn btn-outline" style="width:100%;justify-content:center">← Kembali ke Things To Do</a>

  // Fix responsive for mobile
  if (window.innerWidth <= 900) {
    const body = document.querySelector('.dest-body, [style*="grid-template-columns"]');
    if (body) body.style.gridTemplateColumns = '1fr';
  }
}

function shareDestination() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href);
    showToast('Link disalin! 📋');
  }
}

function saveDest(id) {
  if (!requireLogin()) return;
  const saved = JSON.parse(localStorage.getItem('sd_saved') || '[]');
  if (!saved.includes(id)) { saved.push(id); localStorage.setItem('sd_saved', JSON.stringify(saved)); showToast('Destinasi disimpan! 🔖', 'success'); }
  else { showToast('Sudah tersimpan sebelumnya.'); }
}

/* ── Firebase-first loader ── */
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id') || 'ciletuh';

  // Try loading from Firebase by numeric id or slug key
  try {
    const allDests = await DB.getList('destinations');
    // match by id (numeric), name slug, or _key
    const firebaseDest = allDests.find(d =>
      String(d.id) === idParam ||
      d._key === idParam ||
      (d.name || '').toLowerCase().replace(/\s+/g,'-') === idParam
    );

    if (firebaseDest) {
      // Build a compatible object from Firebase data
      const bg = firebaseDest.color || 'bg-teal';
      const isDark = bg === 'bg-blue' || bg === 'bg-red' || bg === 'bg-dark';
      const tipsArr = (firebaseDest.tips || '').split('\n').filter(Boolean);
      const info = {
        jam: firebaseDest.jam || 'Sesuai jadwal',
        tiket: firebaseDest.tiket || 'Hubungi pengelola',
        jarak: '-', waktu: '-', parkir: 'Tersedia', guide: 'Tersedia'
      };
      const tags = (firebaseDest.cat || 'Wisata').split('/').map(t => t.trim());
      const reviewCount = firebaseDest.reviewCount || firebaseDest.rating ? Math.round((firebaseDest.rating || 4.5) * 100) : 100;

      renderWithData({
        id: idParam,
        name: firebaseDest.name,
        emoji: firebaseDest.emoji || '🏔️',
        bgColor: bg,
        imageUrl: firebaseDest.imageUrl || '',
        loc: firebaseDest.loc || 'Sukabumi',
        category: firebaseDest.cat || 'Wisata',
        rating: firebaseDest.rating || 4.5,
        reviews: reviewCount,
        tags,
        desc: firebaseDest.descFull || firebaseDest.descShort || '',
        tips: tipsArr,
        info,
        gallery: [],
        nearby: [],
        reviewsList: []
      });
      return;
    }
  } catch(e) {
    console.warn('Firebase load failed, using local data:', e);
  }

  // Fallback to local hardcoded data
  renderDest();
});

function renderWithData(d) {
  const BG_COLORS = { 'bg-blue':'#2D32F0','bg-orange':'#F05A10','bg-red':'#C83060','bg-teal':'#5DD4C4','bg-yellow':'#F0C820','bg-peach':'#F5C8B0','bg-dark':'#181818' };
  const bgHex = BG_COLORS[d.bgColor] || '#5DD4C4';
  const isDark = ['bg-blue','bg-red','bg-dark'].includes(d.bgColor);
  const textColor = isDark ? 'var(--white)' : 'var(--dark)';
  const tagsHtml = (d.tags||[]).map(t => `<span class="tag" style="border-color:rgba(${isDark?'255,255,255':'0,0,0'},0.3);color:inherit">${t}</span>`).join('');
  const tipsHtml = (d.tips||[]).map(t => `<li>${t}</li>`).join('');

  const heroImgHtml = d.imageUrl
    ? `<div class="dest-hero-bg" style="opacity:1;"><img src="${d.imageUrl}" alt="${d.name}" style="width:100%;height:100%;object-fit:cover;opacity:0.25"></div>`
    : `<div class="dest-hero-bg">${d.emoji}</div>`;

  const infoRowsHtml = Object.entries({
    '🕐': ['Jam Buka', d.info.jam],
    '🎫': ['Tiket Masuk', d.info.tiket],
    '📍': ['Lokasi', d.loc],
    '🚗': ['Waktu Tempuh', d.info.waktu],
    '🅿️': ['Parkir', d.info.parkir],
    '👤': ['Guide', d.info.guide],
  }).map(([icon, [label, v]]) => `
    <div class="info-row">
      <div class="ir-icon">${icon}</div>
      <div><div class="ir-label">${label}</div><div class="ir-val">${v}</div></div>
    </div>`).join('');

  document.getElementById('destContent').innerHTML = `
    <div class="dest-hero" style="background:${bgHex};color:${textColor}">
      ${heroImgHtml}
      <div class="dest-hero-inner">
        <div class="breadcrumb"><a href="/SukabumiDiscovery" style="color:inherit;opacity:.7">Home</a><span>›</span><a href="/SukabumiDiscovery/things-to-do" style="color:inherit;opacity:.7">Things To Do</a><span>›</span><span>${d.name}</span></div>
        <div class="dest-hero-meta">${tagsHtml}</div>
        <h1>${d.name}</h1>
        <div class="dest-hero-meta" style="margin-top:12px">
          <span>📍 ${d.loc}</span>
          <span>⭐ ${d.rating} · ${d.category}</span>
        </div>
        <div class="dest-hero-actions">
          <a href="/SukabumiDiscovery/map" class="btn btn-white">🗺 Lihat di Peta</a>
          <button class="btn" style="background:rgba(0,0,0,0.2);color:inherit;border-color:rgba(255,255,255,0.3)" onclick="shareDestination()">📤 Bagikan</button>
          <button class="btn" style="background:rgba(0,0,0,0.2);color:inherit;border-color:rgba(255,255,255,0.3)" onclick="saveDest('${d.id}')">🔖 Simpan</button>
        </div>
      </div>
    </div>

    <div class="color-band"></div>

    <div style="max-width:var(--max-w);margin:0 auto;padding:60px 40px;display:grid;grid-template-columns:1fr 360px;gap:60px" class="dest-layout">
      <div>
        <div class="dest-section-title">Tentang ${d.name}</div>
        <div class="dest-desc">${(d.desc||'').split('\n').filter(l=>l.trim()).map(l=>`<p style="margin-bottom:16px">${l.trim()}</p>`).join('') || '<p style="color:#888">Deskripsi belum tersedia.</p>'}</div>

        ${d.imageUrl ? `
        <div class="dest-section-title">Foto</div>
        <div style="border-radius:18px;overflow:hidden;border:2px solid var(--dark);margin-bottom:40px">
          <img src="${d.imageUrl}" alt="${d.name}" style="width:100%;max-height:400px;object-fit:cover;display:block">
        </div>` : ''}

        <div class="dest-section-title">Tips & Persiapan</div>
        <ul class="tips-list">${tipsHtml || '<li>Hubungi pengelola untuk informasi lebih lanjut.</li>'}</ul>

        <div class="add-review" onclick="requireLogin() && showToast('Fitur ulasan segera hadir! ✍️','success')">+ Tulis Ulasan</div>
      </div>

      <div>
        <div class="info-box">${infoRowsHtml}</div>
        <div class="map-box"><div class="map-placeholder"><div>🗺️</div><span>Lokasi: ${d.loc}</span><a href="/SukabumiDiscovery/map">Buka Peta Interaktif →</a></div></div>
        <a href="/SukabumiDiscovery/things-to-do" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:14px">← Kembali ke Things To Do</a>
      </div>
    </div>
  `;

  document.title = `${d.name} — Sukabumi Discovery`;

  // Responsive
  if (window.innerWidth <= 900) {
    const body = document.querySelector('.dest-layout');
    if (body) body.style.gridTemplateColumns = '1fr';
  }
  window.addEventListener('resize', () => {
    const body = document.querySelector('.dest-layout');
    if (body) body.style.gridTemplateColumns = window.innerWidth <= 900 ? '1fr' : '1fr 360px';
  });
  initScrollReveal();
}
</script>
