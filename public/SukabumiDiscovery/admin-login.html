<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Sukabumi Discovery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0B;--surface:#111113;--border:#1E1E24;--border2:#2A2A32;
  --text:#EEECEA;--muted:#5A5A6A;--accent:#F05A10;--teal:#5DD4C4;--red:#C83060;
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
}
html,body{height:100%}
body{
  font-family:var(--display);background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
                   linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:0.35;pointer-events:none;
}
body::after{
  content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(240,90,16,0.07) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.brand{text-align:center;margin-bottom:32px}
.logo{display:inline-flex;flex-direction:column;line-height:1.05;font-size:20px;font-weight:800;margin-bottom:10px}
.logo span:first-child{color:var(--teal)}
.logo span:last-child{color:var(--accent)}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(240,90,16,0.1);border:1px solid rgba(240,90,16,0.25);
  color:var(--accent);font-family:var(--mono);font-size:10px;
  padding:4px 14px;border-radius:100px;letter-spacing:.08em;
}

.box{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:18px;padding:32px;
  box-shadow:0 0 0 1px var(--border),0 20px 50px rgba(0,0,0,.55);
}
.box-title{font-size:22px;font-weight:800;margin-bottom:4px}
.box-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:26px}

.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.field input{
  width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border2);
  border-radius:9px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:all .2s;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,90,16,.1)}
.field input::placeholder{color:#333}

.login-btn{
  width:100%;padding:13px;background:var(--accent);color:var(--text);border:none;
  border-radius:9px;font-family:var(--display);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-btn:hover{background:#d44e0e;box-shadow:0 6px 20px rgba(240,90,16,.3)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}

.err{
  background:rgba(200,48,96,.1);border:1px solid rgba(200,48,96,.25);
  color:#f87a9a;font-family:var(--mono);font-size:11px;
  padding:9px 12px;border-radius:7px;margin-top:10px;display:none;
}
.err.show{display:block}

.hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;line-height:1.9}
.hint code{background:var(--border);padding:2px 7px;border-radius:4px;color:var(--teal);font-size:11px}

.back{display:block;text-align:center;margin-top:18px;font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;transition:color .2s}
.back:hover{color:var(--text)}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="logo"><span>SUKABUMI</span><span>DISCOVERY</span></div>
    <br>
    <span class="badge">⬡ SUPER ADMIN PANEL</span>
  </div>

  <div class="box">
    <div class="box-title">Admin Login</div>
    <div class="box-sub">// akses terbatas · firebase authenticated</div>

    <div class="field">
      <label>Email Admin</label>
      <input type="email" id="email" placeholder="admin@sukabumidiscovery.com" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••••">
    </div>

    <div class="err" id="errBox"></div>

    <button class="login-btn" id="loginBtn" onclick="doAdminLogin()">
      Masuk ke Dashboard
      <span class="spinner" id="spinner"></span>
    </button>

    <div class="hint">
      Gunakan akun Firebase Admin yang sudah dibuat.<br>
      Default: <code>admin@sukabumidiscovery.com</code>
    </div>
  </div>

  <a href="index.html" class="back">← Kembali ke website utama</a>
</div>

<script>
const ADMIN_EMAILS = [
  'admin@sukabumidiscovery.com',
  'akmal@sukabumidiscovery.com',
  // tambahkan email admin lain di sini
];

// Check jika sudah login sebagai admin
firebase.auth().onAuthStateChanged(async (user) => {
  if (user && ADMIN_EMAILS.includes(user.email)) {
    // Sudah login sebagai admin, langsung redirect
    window.location.href = 'admin.html';
  }
});

async function doAdminLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const err   = document.getElementById('errBox');
  const btn   = document.getElementById('loginBtn');
  const sp    = document.getElementById('spinner');

  err.classList.remove('show');

  if (!email || !pass) {
    err.textContent = 'Isi email dan password.';
    err.classList.add('show');
    return;
  }

  // Check apakah email termasuk admin
  if (!ADMIN_EMAILS.includes(email)) {
    err.textContent = 'Akun ini tidak memiliki akses admin.';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  sp.style.display = 'block';
  btn.childNodes[0].textContent = 'Memverifikasi... ';

  try {
    await firebase.auth().signInWithEmailAndPassword(email, pass);
    // onAuthStateChanged akan handle redirect
  } catch(e) {
    btn.disabled = false;
    sp.style.display = 'none';
    btn.childNodes[0].textContent = 'Masuk ke Dashboard';
    const msgs = {
      'auth/user-not-found': 'Email admin tidak ditemukan.',
      'auth/wrong-password': 'Password salah.',
      'auth/invalid-credential': 'Email atau password salah.',
      'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti.',
    };
    err.textContent = msgs[e.code] || e.message;
    err.classList.add('show');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doAdminLogin(); });
</script>
</body>
</html>
