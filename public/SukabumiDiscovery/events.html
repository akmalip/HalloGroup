<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — Sukabumi Discovery</title>
<link rel="stylesheet" href="/SukabumiDiscovery/shared.css">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
.ev-header { background: var(--red); color: var(--white); padding: 110px 40px 50px; position: relative; overflow: hidden; }
.ev-header::before { content: '📅'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 180px; opacity: 0.12; pointer-events: none; }
.ev-header h1 { font-family: var(--font-display); font-size: clamp(40px,7vw,80px); font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
.ev-header p { font-size: 17px; color: rgba(255,255,255,0.8); margin-top: 14px; max-width: 480px; }

.ev-body { max-width: var(--max-w); margin: 0 auto; padding: 50px 40px; }
.ev-filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 36px; align-items: center; }
.ev-count { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: #888; margin-left: auto; }

.ev-month-group { margin-bottom: 50px; }
.ev-month-label { font-family: var(--font-display); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--dark); }
.ev-list { display: flex; flex-direction: column; gap: 16px; }

.ev-big-card {
  border: 2px solid var(--dark); border-radius: 22px; overflow: hidden;
  background: var(--white); cursor: pointer; text-decoration: none; color: var(--dark);
  transition: transform 0.25s, box-shadow 0.25s; display: grid; grid-template-columns: 120px 1fr auto;
}
.ev-big-card.has-img { grid-template-columns: 200px 1fr auto; }
.ev-big-card:hover { transform: translateY(-4px); box-shadow: 4px 4px 0 var(--dark); }

.ev-img-col { overflow: hidden; border-right: 2px solid var(--dark); }
.ev-img-col img { width: 100%; height: 100%; object-fit: cover; display: block; }

.ev-date-col { border-right: 2px solid var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 16px; min-width: 100px; }
.ev-date-col .day { font-family: var(--font-display); font-size: 48px; font-weight: 800; line-height: 1; }
.ev-date-col .month { font-family: var(--font-display); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }

.ev-content { padding: 20px 24px; }
.ev-content h3 { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.ev-content p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 10px; }
.ev-meta-row { display: flex; gap: 14px; flex-wrap: wrap; }
.ev-meta-item { font-size: 12px; color: #888; font-family: var(--font-display); font-weight: 600; display: flex; gap: 5px; align-items: center; }
.ev-action { padding: 20px; display: flex; align-items: center; }

.submit-event { background: var(--yellow); border-top: 3px solid var(--dark); padding: 60px 40px; text-align: center; }
.submit-event h2 { font-family: var(--font-display); font-size: clamp(28px,4vw,48px); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 14px; }
.submit-event p { font-size: 16px; color: #444; max-width: 460px; margin: 0 auto 28px; line-height: 1.7; }

/* loading */
.ev-skel { border: 2px solid #e0e0e0; border-radius: 22px; overflow: hidden; background: #fff; display: grid; grid-template-columns: 100px 1fr; gap: 0; margin-bottom: 16px; }
.skel { background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: skel 1.4s infinite; border-radius: 8px; }
@keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* empty state */
.empty-state { text-align: center; padding: 80px 20px; }
.empty-state .ei { font-size: 64px; margin-bottom: 16px; }
.empty-state h3 { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: #888; }

@media (max-width: 700px) {
  .ev-body { padding: 40px 20px; }
  .ev-header { padding: 90px 20px 40px; }
  .ev-big-card, .ev-big-card.has-img { grid-template-columns: 80px 1fr; }
  .ev-action, .ev-img-col { display: none; }
  .ev-date-col .day { font-size: 32px; }
}
</style>
</head>
<body>
<script src="shared.js"></script>
<script>renderNav('events');</script>

<div class="ev-header">
  <div class="breadcrumb" style="color:rgba(255,255,255,0.6)">
    <a href="index.html" style="color:rgba(255,255,255,0.6)">Home</a><span>›</span><span>Events</span>
  </div>
  <h1>Events &<br>Happenings.</h1>
  <p>Semua yang lagi rame dan happening di Sukabumi — festival, pasar, pertunjukan, dan banyak lagi.</p>
</div>

<div class="color-band"></div>

<div class="ev-body">
  <div class="ev-filter-row" id="filterRow">
    <button class="chip active c-red" data-filter="all" onclick="filterEvents(this,'all')">Semua</button>
    <button class="chip" data-filter="Festival" onclick="filterEvents(this,'Festival')">Festival</button>
    <button class="chip" data-filter="Outdoor" onclick="filterEvents(this,'Outdoor')">Outdoor</button>
    <button class="chip" data-filter="Pasar" onclick="filterEvents(this,'Pasar')">Pasar</button>
    <button class="chip" data-filter="Seni & Budaya" onclick="filterEvents(this,'Seni & Budaya')">Seni & Budaya</button>
    <button class="chip" data-filter="Sport" onclick="filterEvents(this,'Sport')">Sport</button>
    <button class="chip" data-filter="Live Music" onclick="filterEvents(this,'Live Music')">Live Music</button>
    <span class="ev-count" id="evCount">Memuat...</span>
  </div>

  <div id="eventsContainer">
    <!-- skeleton loading -->
    <div class="ev-skel"><div class="skel" style="min-height:120px;border-radius:0;margin:0"></div><div style="padding:20px"><div class="skel" style="height:22px;margin-bottom:12px;width:70%"></div><div class="skel" style="height:14px;margin-bottom:8px"></div><div class="skel" style="height:14px;width:50%"></div></div></div>
    <div class="ev-skel"><div class="skel" style="min-height:120px;border-radius:0;margin:0"></div><div style="padding:20px"><div class="skel" style="height:22px;margin-bottom:12px;width:70%"></div><div class="skel" style="height:14px;margin-bottom:8px"></div><div class="skel" style="height:14px;width:50%"></div></div></div>
    <div class="ev-skel"><div class="skel" style="min-height:120px;border-radius:0;margin:0"></div><div style="padding:20px"><div class="skel" style="height:22px;margin-bottom:12px;width:70%"></div><div class="skel" style="height:14px;margin-bottom:8px"></div><div class="skel" style="height:14px;width:50%"></div></div></div>
  </div>
</div>

<div class="submit-event">
  <h2>Punya event di Sukabumi?</h2>
  <p>Submit event kamu dan kami akan tampilkan secara gratis di Sukabumi Discovery.</p>
  <button class="btn btn-primary btn-lg" onclick="requireLogin() && showToast('Fitur submit event segera hadir! 🎉','success')">Submit Event →</button>
</div>

<script>
const MONTHS_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const EV_BG = { Festival:'var(--orange)', Sport:'var(--teal)', Pasar:'var(--blue)', 'Seni & Budaya':'var(--yellow)', 'Live Music':'var(--dark)', Outdoor:'var(--red)' };

let allEvents = [];
let activeFilter = 'all';

DB.listenEvents(events => {
  allEvents = events.filter(e => e.status === 'published')
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  renderEvents();
});

function filterEvents(btn, filter) {
  document.querySelectorAll('.ev-filter-row .chip').forEach(c => c.classList.remove('active','c-red','c-blue','c-teal','c-orange'));
  btn.classList.add('active','c-red');
  activeFilter = filter;
  renderEvents();
}

function renderEvents() {
  const filtered = activeFilter === 'all' ? allEvents : allEvents.filter(e => e.type === activeFilter);
  document.getElementById('evCount').textContent = `${filtered.length} event`;

  if (!filtered.length) {
    document.getElementById('eventsContainer').innerHTML = `
      <div class="empty-state">
        <div class="ei">📅</div>
        <h3>Belum ada event</h3>
        <p>Event akan muncul di sini setelah admin menambahkannya.</p>
      </div>`;
    return;
  }

  // Group by month
  const groups = {};
  filtered.forEach(ev => {
    const d = new Date(ev.date);
    const key = isNaN(d) ? 'Lainnya' : `${MONTHS_ID[d.getMonth()]} ${d.getFullYear()}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(ev);
  });

  let html = '';
  Object.entries(groups).forEach(([month, evs]) => {
    html += `<div class="ev-month-group"><div class="ev-month-label">${month}</div><div class="ev-list">`;
    evs.forEach((ev, idx) => {
      const d = new Date(ev.date);
      const day = isNaN(d) ? '?' : d.getDate();
      const mon = isNaN(d) ? '' : MONTHS_SHORT[d.getMonth()];
      const bg = EV_BG[ev.type] || 'var(--dark)';
      const isDark = !['var(--yellow)','var(--teal)'].includes(bg);
      const textColor = isDark ? 'white' : 'var(--dark)';
      const hasImg = !!ev.imageUrl;

      html += `
      <a class="ev-big-card reveal ${hasImg ? 'has-img' : ''}" href="#">
        ${hasImg ? `<div class="ev-img-col"><img src="${ev.imageUrl}" alt="${ev.name}"></div>` : ''}
        <div class="ev-date-col" style="background:${bg};color:${textColor}">
          <div class="day">${day}</div>
          <div class="month" style="color:${isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.6)'}">${mon}</div>
        </div>
        <div class="ev-content">
          <h3>${ev.name}</h3>
          <p>${ev.desc || ''}</p>
          <div class="ev-meta-row">
            <span class="ev-meta-item">📍 ${ev.loc || ''}</span>
            ${ev.timeStart ? `<span class="ev-meta-item">🕐 ${ev.timeStart}${ev.timeEnd ? '–'+ev.timeEnd : ''}</span>` : ''}
            <span class="ev-meta-item"><span class="tag tag-${typeTagColor(ev.type)}">${ev.type || 'Event'}</span></span>
            ${ev.ticket ? `<span class="ev-meta-item"><span class="tag">${ev.ticket}</span></span>` : ''}
          </div>
        </div>
        <div class="ev-action"><span class="btn btn-primary btn-sm">Detail →</span></div>
      </a>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('eventsContainer').innerHTML = html;
  initScrollReveal();
}

function typeTagColor(type) {
  const map = { Festival:'orange', Sport:'teal', Pasar:'blue', 'Seni & Budaya':'yellow', 'Live Music':'red' };
  return map[type] || '';
}
</script>
</body>
</html>
